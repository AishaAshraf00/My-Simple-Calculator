<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CodeWithAisha - Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; background: #f5f5f5; }
    .calc { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #333; margin-bottom: 30px; }
    input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
    button { background: #4CAF50; color: white; border: none; cursor: pointer; font-weight: bold; }
    button:hover { background: #45a049; }
    #result { margin-top: 20px; padding: 15px; background: #e8f5e8; border-radius: 5px; text-align: center; font-size: 18px; font-weight: bold; display: none; }
    label { font-weight: bold; color: #555; }
  </style>
</head>
<body>
  <div class="calc">
    <h1>CodeWithAisha<br>Simple Calculator</h1>
    
    <label>Enter First Number:</label>
    <input type="number" id="num1" placeholder="First number">
    
    <label>Enter Second Number:</label>
    <input type="number" id="num2" placeholder="Second number">
    
    <label>Select Operation:</label>
    <select id="operator">
      <option value="Addition">Addition</option>
      <option value="Subtraction">Subtraction</option>
      <option value="Multiplication">Multiplication</option>
      <option value="Division">Division</option>
    </select>
    
    <button onclick="calculate()">Calculate</button>
    
    <div id="result"></div>
  </div>

  <script>
    function calculate() {
      const num1 = parseFloat(document.getElementById('num1').value);
      const num2 = parseFloat(document.getElementById('num2').value);
      const operator = document.getElementById('operator').value;
      const resultDiv = document.getElementById('result');
      
      if (isNaN(num1) || isNaN(num2)) {
        resultDiv.style.display = 'block';
        resultDiv.style.background = '#ffebee';
        resultDiv.innerHTML = 'Please enter valid numbers';
        return;
      }
      
      let result;
      if (operator === "Addition") {
        result = num1 + num2;
      } else if (operator === "Subtraction") {
        result = num1 - num2;
      } else if (operator === "Multiplication") {
        result = num1 * num2;
      } else if (operator === "Division") {
        if (num2 === 0) {
          resultDiv.style.display = 'block';
          resultDiv.style.background = '#ffebee';
          resultDiv.innerHTML = 'Cannot divide by zero';
          return;
        }
        result = num1 / num2;
      }
      
      resultDiv.style.display = 'block';
      resultDiv.style.background = '#e8f5e8';
      resultDiv.innerHTML = `Result: ${result}`;
    }
  </script>
</body>
</html>
